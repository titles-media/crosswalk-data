name: Validate CSV data

on:
  push:
    paths:
      - "data/**"
      - "schema/**"
  pull_request:
    paths:
      - "data/**"
      - "schema/**"
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Validate movies
        run: python scripts/validate_works.py data/works/movies.csv --fail-fast
