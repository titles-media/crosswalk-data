name: Add Movies

on:
  workflow_dispatch:
    inputs:
      ids:
        description: "IMDb (tt…) or Wikidata (Q…) IDs, one per line"
        required: true
        type: string
      branch:
        description: "Branch to push to (created from main if it does not exist)"
        required: true
        type: string
      force:
        description: "Re-fetch and replace entries that already exist"
        required: false
        type: boolean
        default: false
      delay:
        description: "Seconds between Wikidata requests"
        required: false
        type: string
        default: "1.0"

permissions:
  contents: write
  pull-requests: write

jobs:
  add-movies:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install pyyaml requests

      - name: Checkout or create branch
        run: |
          if git ls-remote --exit-code --heads origin "${{ inputs.branch }}"; then
            git checkout "${{ inputs.branch }}"
          else
            git checkout -b "${{ inputs.branch }}"
          fi

      - name: Write IDs to file
        env:
          IDS: ${{ inputs.ids }}
        run: echo "$IDS" > /tmp/ids.txt

      - name: Run add_movie.py
        run: |
          ARGS="--from-file /tmp/ids.txt --ignore-existing --delay ${{ inputs.delay }}"
          if [ "${{ inputs.force }}" = "true" ]; then
            ARGS="$ARGS --force"
          fi
          python scripts/add_movie.py $ARGS

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No new entries to commit."
          else
            git commit -m "Add movies (${{ inputs.branch }})"
            git push origin "${{ inputs.branch }}"
          fi

      - name: Open PR if not exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh pr view "${{ inputs.branch }}" --json number > /dev/null 2>&1; then
            gh pr create \
              --base main \
              --head "${{ inputs.branch }}" \
              --title "Add movies: ${{ inputs.branch }}" \
              --body "Batch ingest via [Add Movies](../actions/workflows/add-movies.yml) workflow."
          else
            echo "PR already exists for ${{ inputs.branch }}, skipping."
          fi
