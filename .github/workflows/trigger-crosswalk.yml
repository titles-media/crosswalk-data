name: Trigger Crosswalk Build

on:
  push:
    branches: [main]
    paths:
      - "data/**"
      - "schema/**"
  workflow_dispatch:

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Fire repository_dispatch to crosswalk
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.CROSSWALK_DISPATCH_TOKEN }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: 'titles-media',
              repo: 'crosswalk',
              event_type: 'crosswalk-data-updated'
            })
